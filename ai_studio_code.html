<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetScribe IA - Google Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a73e8; --primary-dark: #1557b0;
      --bg: #f8f9fa; --surface: #ffffff;
      --text: #202124; --text-light: #5f6368;
      --border: #dadce0; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
    .container { max-width: 800px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 30px; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primary); }
    
    .config-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px; }
    .config-card h3 { font-size: 14px; margin-bottom: 15px; color: var(--text-light); text-transform: uppercase; }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
    
    .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    
    /* Voz / Micrófono */
    .voice-section { background: var(--surface); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }
    .btn-mic { width: 80px; height: 80px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; transition: 0.3s; margin-bottom: 15px; position: relative; }
    .btn-mic:hover { transform: scale(1.05); background: var(--primary-dark); }
    .btn-mic.listening { background: #ea4335; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
    
    .transcript { background: #f1f3f4; padding: 15px; border-radius: 8px; margin-top: 15px; min-height: 60px; text-align: left; font-size: 15px; border-left: 4px solid var(--primary); }
    
    /* Botones de acción */
    .actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: #e8f0fe; color: var(--primary); }

    /* Receta Visual */
    #receta-final { background: white; padding: 40px; border-radius: 4px; border: 1px solid #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 30px; display: none; }
    .receta-header { border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
    .med-item { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 6px; }

    @media print {
      .no-print { display: none !important; }
      body { background: white; padding: 0; }
      #receta-final { border: none; box-shadow: none; display: block !important; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>VetScribe IA</h1>
    <p>Dictado inteligente para veterinarios</p>
  </header>

  <div class="config-card no-print">
    <h3>1. Configuración de API Google Gemini</h3>
    <input type="password" id="apiKey" placeholder="Pega tu API Key de Gemini aquí..." style="margin-bottom: 10px;">
    <p style="font-size: 12px; color: var(--text-light)">Consigue una gratis en <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></p>
  </div>

  <div class="config-card no-print">
    <h3>2. Datos de la Clínica</h3>
    <div class="input-grid">
      <input type="text" id="clinica" placeholder="Nombre de la Veterinaria">
      <input type="text" id="doctor" placeholder="Nombre del Médico">
    </div>
  </div>

  <div class="main-grid no-print">
    <div class="voice-section">
      <button class="btn-mic" id="btnMic" onclick="toggleListening()">
        <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <p id="status">Haz clic para empezar a dictar</p>
      <div id="transcript" class="transcript" style="display: none;"></div>
      
      <div class="actions" id="actionButtons" style="display: none;">
        <button class="btn btn-secondary" onclick="reset()">Borrar</button>
        <button class="btn btn-primary" onclick="procesarConIA()">Generar Receta</button>
      </div>
    </div>
  </div>

  <!-- Resultado de la Receta -->
  <div id="receta-final">
    <div class="receta-header">
      <div>
        <h2 id="r-clinica" style="color: var(--primary);">Clínica Veterinaria</h2>
        <p id="r-doctor">Dr. Veterinario</p>
      </div>
      <div style="text-align: right">
        <p id="r-fecha"></p>
      </div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div><strong>Paciente:</strong> <span id="r-paciente"></span></div>
      <div><strong>Dueño:</strong> <span id="r-duenio"></span></div>
    </div>

    <div style="margin-bottom: 20px;">
      <strong>Diagnóstico sugerido:</strong>
      <p id="r-diagnostico" style="margin-top:5px"></p>
    </div>

    <div style="margin-bottom: 20px;">
      <strong>Tratamiento:</strong>
      <div id="r-medicamentos" style="margin-top: 10px;"></div>
    </div>

    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
      <strong>Observaciones:</strong>
      <p id="r-obs"></p>
    </div>

    <div class="no-print" style="margin-top: 40px; text-align: center;">
      <button class="btn btn-primary" onclick="window.print()">Imprimir Receta</button>
    </div>
  </div>
</div>

<script>
  let recognition;
  let isListening = false;
  let finalTranscript = '';

  // Inicializar Reconocimiento de Voz Nativo (Gratis)
  if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'es-ES';

    recognition.onresult = (event) => {
      let interimTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; ++i) {
        if (event.results[i].isFinal) {
          finalTranscript += event.results[i][0].transcript;
        } else {
          interimTranscript += event.results[i][0].transcript;
        }
      }
      const box = document.getElementById('transcript');
      box.style.display = 'block';
      box.innerHTML = finalTranscript + '<span style="color: #999">' + interimTranscript + '</span>';
      document.getElementById('actionButtons').style.display = 'flex';
    };
  }

  function toggleListening() {
    if (isListening) {
      recognition.stop();
      document.getElementById('btnMic').classList.remove('listening');
      document.getElementById('status').innerText = 'Dictado pausado';
    } else {
      recognition.start();
      document.getElementById('btnMic').classList.add('listening');
      document.getElementById('status').innerText = 'Escuchando...';
    }
    isListening = !isListening;
  }

  function reset() {
    finalTranscript = '';
    document.getElementById('transcript').innerHTML = '';
    document.getElementById('transcript').style.display = 'none';
    document.getElementById('actionButtons').style.display = 'none';
    document.getElementById('receta-final').style.display = 'none';
  }

  // Integración con Google Gemini API
  async function procesarConIA() {
    const key = document.getElementById('apiKey').value;
    if (!key) return alert("Por favor, ingresa tu API Key de Gemini.");

    document.getElementById('status').innerText = 'Procesando con IA de Google...';
    
    const prompt = `Actúa como un asistente veterinario avanzado. Analiza el siguiente texto de una consulta y extrae la información en formato JSON.
    Texto: "${finalTranscript}"
    JSON esperado:
    {
      "paciente": "nombre",
      "duenio": "nombre",
      "diagnostico": "breve",
      "medicamentos": [{"nombre": "", "dosis": "", "frecuencia": ""}],
      "observaciones": "consejos adicionales"
    }`;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });

      const data = await response.json();
      const rawRes = data.candidates[0].content.parts[0].text;
      const cleanJson = JSON.parse(rawRes.replace(/```json|```/g, ""));
      
      mostrarReceta(cleanJson);
    } catch (error) {
      console.error(error);
      alert("Error al conectar con Gemini. Verifica tu API Key.");
    }
  }

  function mostrarReceta(data) {
    document.getElementById('r-clinica').innerText = document.getElementById('clinica').value || "Clínica Veterinaria";
    document.getElementById('r-doctor').innerText = "Dr. " + (document.getElementById('doctor').value || "Veterinario");
    document.getElementById('r-fecha').innerText = new Date().toLocaleDateString();
    
    document.getElementById('r-paciente').innerText = data.paciente;
    document.getElementById('r-duenio').innerText = data.duenio;
    document.getElementById('r-diagnostico').innerText = data.diagnostico;
    document.getElementById('r-obs').innerText = data.observaciones;
    
    const medsDiv = document.getElementById('r-medicamentos');
    medsDiv.innerHTML = '';
    data.medicamentos.forEach(m => {
      medsDiv.innerHTML += `
        <div class="med-item">
          <strong>${m.nombre}</strong> - ${m.dosis} (${m.frecuencia})
        </div>
      `;
    });

    document.getElementById('receta-final').style.display = 'block';
    document.getElementById('status').innerText = 'Receta lista';
    window.scrollTo({ top: document.getElementById('receta-final').offsetTop, behavior: 'smooth' });
  }
</script>

</body>
</html>
